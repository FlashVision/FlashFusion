# FlashFusion — Cascade Pipeline Configuration
# ===============================================
# Usage: flashfusion train --config configs/flashfusion_cascade_320.yaml
#        flashfusion predict --config configs/flashfusion_cascade_320.yaml --source image.jpg

fusion:
  strategy: cascade
  input_size: [320, 320]
  weights: [1.0, 1.0, 1.0]
  models:
    - type: detection
      source: flashdet
      model_size: s
      weight: 1.0
      checkpoint: null
      frozen: true
    - type: detection
      source: flashdet
      model_size: m
      weight: 1.0
      checkpoint: null
      frozen: true
    - type: classification
      source: flashcls
      model_size: m
      weight: 1.0
      checkpoint: null
      frozen: true

data:
  train: data/fusion_cascade_train
  val: data/fusion_cascade_val
  num_classes: 80
  cls_num_classes: 10
  format: coco

train:
  epochs: 40
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0001
  scheduler: cosine
  warmup_epochs: 3
  save_dir: workspace/flashfusion_cascade
  device: auto
  num_workers: 4
  early_stopping: 10

augment:
  hsv_h: 0.015
  hsv_s: 0.5
  hsv_v: 0.3
  flip_lr: 0.5
  mosaic: 0.0
  scale: [0.85, 1.15]
  translate: 0.1
